<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Sekom Tech-Log Hub</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; background: #1a1a2e; color: #eee; }
    h1 { color: #e94560; text-align: center; border-bottom: 2px solid #e94560; padding-bottom: 10px; }
    h2 { color: #0f3460; background: #e94560; display: inline-block; padding: 5px 15px; border-radius: 4px; font-size: 18px; }
    .container { background: #16213e; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    input, textarea, select { width: 100%; padding: 12px; margin: 8px 0 20px; background: #0f3460; color: #eee; border: 1px solid #e94560; border-radius: 4px; box-sizing: border-box; }
    button { background: #e94560; color: white; padding: 15px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; font-size: 16px; transition: 0.3s; }
    button:hover { background: #ff4d6d; transform: translateY(-2px); }
    table { width: 100%; border-collapse: collapse; margin-top: 25px; background: #16213e; }
    th, td { padding: 15px; border: 1px solid #0f3460; text-align: left; }
    th { background: #0f3460; color: #e94560; }
    .badge { padding: 5px 12px; border-radius: 15px; font-size: 12px; font-weight: bold; color: #fff; }
    .tamamlandi { background: #27ae60; }
    .devam { background: #f39c12; }
    .beklemede { background: #2980b9; }
    .search-box { border-left: 5px solid #e94560; padding-left: 15px; margin-top: 30px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛠 Sekom Tech-Log Hub</h1>
    
    <h2>Yeni Kayıt Ekle</h2>
    <input id="calisan" placeholder="Çalışan Adı (İsim Soyisim)" />
    
    <select id="durum">
      <option value="Tamamlandı">✅ Tamamlandı</option>
      <option value="Devam Ediyor">🔄 Devam Ediyor</option>
      <option value="Beklemede">⏳ Beklemede</option>
    </select>
    
    <textarea id="aciklama" placeholder="Çözülen problem veya yapılan işlem detayları..." rows="3"></textarea>
    
    <button onclick="kaydetEkle()">SİSTEME KAYDET</button>

    <div class="search-box">
      <h2>Kayıtlarda Ara</h2>
      <input id="arama" placeholder="İsim veya çözüm içinde ara..." onkeyup="ara(this.value)" />
    </div><table>
      <thead>
        <tr>
          <th>Çalışan</th>
          <th>Durum</th>
          <th>Açıklama</th>
        </tr>
      </thead>
      <tbody id="tablo">
        <tr><td colspan="3" style="text-align:center">Veriler yükleniyor...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    const API = "http://sekom-api-esragune-s-dev.apps.rm2.thpm.p1.openshiftapps.com";

    function durumBadge(durum) {
      const cls = durum === "Tamamlandı" ? "tamamlandi" : durum === "Devam Ediyor" ? "devam" : "beklemede";
      return `<span class="badge ${cls}">${durum}</span>`;
    }

    async function kayitlariGetir(url = API + "/logs") {
      try {
        const res = await fetch(url);
        const data = await res.json();
        const tablo = document.getElementById("tablo");
        
        if (data.length === 0) {
          tablo.innerHTML = `<tr><td colspan="3" style="text-align:center">Sonuç bulunamadı.</td></tr>`;
          return;
        }

        tablo.innerHTML = data.reverse().map(l => 
          `<tr>
            <td><strong>${l.calisan || l.muhendis || "Bilinmiyor"}</strong></td>
            <td>${durumBadge(l.durum || "Belirsiz")}</td>
            <td>${l.aciklama || l.not || ""}</td>
          </tr>`
        ).join("");
      } catch (e) {
        console.error("Hata:", e);
      }
    }async function kaydetEkle() {
      const calisan = document.getElementById("calisan").value;
      const durum = document.getElementById("durum").value;
      const aciklama = document.getElementById("aciklama").value;

      if(!calisan || !aciklama) { alert("Lütfen isim ve açıklama alanlarını doldurun!"); return; }

      await fetch(API + "/logs", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ calisan, durum, aciklama })
      });

      alert("🚀 Kayıt başarıyla Tech-Log Hub'a eklendi!");
      document.getElementById("calisan").value = "";
      document.getElementById("aciklama").value = "";
      kayitlariGetir();
    }

    function ara(kelime) {
      if (kelime.trim() === "") {
        kayitlariGetir(); // Arama kutusu boşsa tüm listeyi getir
      } else {
        kayitlariGetir(API + "/search?q=" + kelime);
      }
    }// İlk açılışta verileri çek
    kayitlariGetir();
  </script>
</body>
</html>
